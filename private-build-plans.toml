[buildPlans.Diosevka]
family = "Diosevka"
spacing = "fontconfig-mono"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.Diosevka.variants.design]
one = "base-flat-top-serif"
three = "flat-top-serifless"
four = "semi-open-serifless"
five = "oblique-arched-serifless"
six = "straight-bar"
seven = "bend-serifless"
eight = "crossing-asymmetric"
zero = "diamond-slashed-split"
capital-a = "curly-serifless"
capital-b = "standard-serifless"
capital-g = "toothed-serifless-hooked"
capital-i = "short-serifed"
capital-k = "straight-serifless"
capital-n = "standard-serifless"
capital-q = "straight"
capital-r = "straight-serifless"
capital-v = "curly-serifless"
capital-w = "curly-serifless"
capital-x = "curly-serifless"
capital-y = "curly-serifless"
capital-z = "curly-serifless"
f = "serifless"
g = "double-storey"
i = "serifed-asymmetric"
j = "serifed"
l = "serifed-asymmetric"
m = "serifless"
t = "bent-hook"
u = "toothed-serifless"
v = "curly-serifless"
w = "curly-serifless"
x = "curly-serifless"
y = "curly-turn-serifless"
z = "curly-serifless"
capital-eszet = "flat-top-serifless"
lower-alpha = "crossing"
tittle = "round"
diacritic-dot = "round"
punctuation-dot = "round"
tilde = "low"
asterisk = "penta-mid"
underscore = "high"
caret = "medium"
ascii-grave = "straight"
ascii-single-quote = "straight"
paren = "flat-arc"
brace = "straight"
guillemet = "curly"
number-sign = "slanted"
ampersand = "upper-open"
at = "threefold"
dollar = "open"
cent = "open"
percent = "dots"
question = "smooth"
decorative-angle-brackets = "short"
lig-ltgteq = "slanted"
lig-neq = "slightly-slanted"
lig-equal-chain = "without-notch"
lig-hyphen-chain = "without-notch"
lig-double-arrow-bar = "without-notch"
lig-single-arrow-bar = "without-notch"

[buildPlans.Diosevka.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Diosevka.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.Diosevka.weights.Medium]
shape = 500
menu = 500
css = 500

[buildPlans.Diosevka.weights.SemiBold]
shape = 600
menu = 600
css = 600

[buildPlans.Diosevka.widths.Normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.Diosevka.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Diosevka.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
